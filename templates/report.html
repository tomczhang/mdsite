<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='72' text-anchor='middle' font-size='80'>📄</text></svg>">
  <!-- 自包含：依赖全走公网 jsdelivr CDN，产物就一个 .html -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    html { scroll-behavior: smooth; }
    .prose-mdsite h1 { font-size: 1.875rem; font-weight: 700; margin: 1.5rem 0 1rem; line-height: 1.3; }
    .prose-mdsite h2 { font-size: 1.5rem; font-weight: 600; margin: 1.4rem 0 .8rem; }
    .prose-mdsite h3 { font-size: 1.25rem; font-weight: 600; margin: 1.2rem 0 .6rem; }
    .prose-mdsite p { margin: .75rem 0; line-height: 1.8; color: #1f2937; }
    .prose-mdsite ul, .prose-mdsite ol { margin: .75rem 0; padding-left: 1.5rem; }
    .prose-mdsite li { margin: .3rem 0; line-height: 1.7; }
    .prose-mdsite ul { list-style: disc; }
    .prose-mdsite ol { list-style: decimal; }
    .prose-mdsite a { color: #2563eb; text-decoration: underline; }
    .prose-mdsite code { background: #f3f4f6; padding: .1rem .35rem; border-radius: .25rem; font-size: .9em; }
    .prose-mdsite pre { background: #0f172a; color: #e2e8f0; padding: 1rem 1.25rem; border-radius: .5rem; overflow-x: auto; margin: 1rem 0; }
    .prose-mdsite pre code { background: transparent; color: inherit; padding: 0; }
    .prose-mdsite blockquote { border-left: 3px solid #cbd5e1; padding-left: 1rem; color: #475569; margin: 1rem 0; }
    .prose-mdsite table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
    .prose-mdsite th, .prose-mdsite td { border: 1px solid #e5e7eb; padding: .5rem .75rem; text-align: left; }
    .prose-mdsite th { background: #f9fafb; font-weight: 600; }
    .prose-mdsite img { max-width: 100%; border-radius: .5rem; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ROOT}}index.html" class="text-sm text-gray-400 hover:text-blue-600">&larr; 返回首页</a>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-400">{{DATE}}</span>
        <button onclick="navigator.clipboard && navigator.clipboard.writeText(location.href)"
                title="复制链接"
                class="text-xs text-gray-400 hover:text-blue-600 border border-gray-200 rounded px-2 py-1">分享</button>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-10">
    <header class="mb-8 pb-6 border-b border-gray-100">
      <p class="text-xs uppercase tracking-wide text-blue-600 font-medium mb-2">{{CATEGORY}}</p>
      <h1 class="text-3xl font-bold text-gray-900 leading-tight">{{TITLE}}</h1>
      <p class="mt-3 text-sm text-gray-500">{{DATE}}</p>
    </header>
    <article class="prose-mdsite">
      {{BODY}}
    </article>
  </main>

  <footer class="max-w-3xl mx-auto px-6 py-8 text-center text-xs text-gray-400">
    由 <span class="font-medium">{{SITE_TITLE}}</span> 生成 · <a href="{{ROOT}}index.html" class="hover:text-blue-600">查看全部报告</a>
  </footer>
</body>
</html>
