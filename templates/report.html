<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='72' text-anchor='middle' font-size='80'>📄</text></svg>">
  <!-- 单文件自包含：依赖全走公网 jsdelivr CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    html { scroll-behavior: smooth; }
    [x-cloak] { display: none !important; }

    /* 正文排版（语雀/Notion 风：宽松行距、清晰层级） */
    .prose-mdsite { color: #1f2329; font-size: 16px; line-height: 1.8; }
    .prose-mdsite > :first-child { margin-top: 0; }
    .prose-mdsite h1, .prose-mdsite h2, .prose-mdsite h3, .prose-mdsite h4 { scroll-margin-top: 5rem; font-weight: 600; color: #1f2329; line-height: 1.4; }
    .prose-mdsite h1 { font-size: 1.7rem; margin: 2rem 0 1rem; }
    .prose-mdsite h2 { font-size: 1.375rem; margin: 2rem 0 .9rem; padding-bottom: .4rem; border-bottom: 1px solid #f0f0f0; }
    .prose-mdsite h3 { font-size: 1.15rem; margin: 1.5rem 0 .6rem; }
    .prose-mdsite h4 { font-size: 1rem; margin: 1.2rem 0 .5rem; color: #424750; }
    .prose-mdsite p { margin: .85rem 0; }
    .prose-mdsite ul, .prose-mdsite ol { margin: .85rem 0; padding-left: 1.6rem; }
    .prose-mdsite li { margin: .35rem 0; }
    .prose-mdsite ul { list-style: disc; }
    .prose-mdsite ol { list-style: decimal; }
    .prose-mdsite li::marker { color: #86909c; }
    .prose-mdsite a { color: #1677ff; text-decoration: none; border-bottom: 1px solid rgba(22,119,255,.3); }
    .prose-mdsite a:hover { border-bottom-color: #1677ff; }
    .prose-mdsite strong { color: #1f2329; font-weight: 600; }
    .prose-mdsite code { background: #f2f3f5; color: #d4380d; padding: .12rem .4rem; border-radius: 4px; font-size: .88em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .prose-mdsite pre { background: #0d1117; color: #e6edf3; padding: 1.1rem 1.3rem; border-radius: 10px; overflow-x: auto; margin: 1.2rem 0; font-size: .9rem; line-height: 1.6; }
    .prose-mdsite pre code { background: transparent; color: inherit; padding: 0; font-size: inherit; }
    .prose-mdsite kbd { display: inline-block; background: #fafbfc; border: 1px solid #d0d7de; border-bottom-width: 2px; border-radius: 5px; padding: .05rem .4rem; font-size: .82em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #1f2329; line-height: 1.4; }
    .prose-mdsite blockquote { border-left: 3px solid #1677ff; background: #f7f9ff; padding: .6rem 1rem; color: #4e5969; margin: 1.1rem 0; border-radius: 0 6px 6px 0; }
    .prose-mdsite blockquote p { margin: .3rem 0; }
    .prose-mdsite table { border-collapse: collapse; margin: 1.2rem 0; width: 100%; font-size: .92rem; }
    .prose-mdsite th, .prose-mdsite td { border: 1px solid #e5e6eb; padding: .55rem .85rem; text-align: left; }
    .prose-mdsite th { background: #f7f8fa; font-weight: 600; }
    .prose-mdsite tr:nth-child(even) td { background: #fafbfc; }
    .prose-mdsite img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
    .prose-mdsite hr { border: none; border-top: 1px solid #f0f0f0; margin: 2rem 0; }

    /* 语义提示块（GitHub 风 [!TYPE]）：按语义定色 + 左色条 + 图标 */
    .callout { margin: 1.2rem 0; padding: .75rem 1rem; border-left: 4px solid; border-radius: 0 8px 8px 0; }
    .callout-title { font-weight: 600; font-size: .9rem; display: flex; align-items: center; gap: .4rem; margin-bottom: .35rem; }
    .callout-icon { font-size: 1rem; }
    .callout-body > :first-child { margin-top: 0; }
    .callout-body > :last-child { margin-bottom: 0; }
    .callout-note      { background: #f2f7ff; border-color: #1677ff; }
    .callout-note .callout-title { color: #1677ff; }
    .callout-tip       { background: #f0faf4; border-color: #00b42a; }
    .callout-tip .callout-title { color: #009a29; }
    .callout-important { background: #f6f2ff; border-color: #7b5cff; }
    .callout-important .callout-title { color: #6a3ff0; }
    .callout-warning   { background: #fff9ec; border-color: #ff9a2e; }
    .callout-warning .callout-title { color: #d97500; }
    .callout-caution   { background: #fff1f0; border-color: #f53f3f; }
    .callout-caution .callout-title { color: #cb2634; }

    /* 速览卡片网格（摘要后的「速览」要点卡，见 SKILL 工作流） */
    .ql-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: .9rem; margin: 1rem 0 1.5rem; }
    .ql-card { background: #fafbfc; border: 1px solid #eef0f2; border-radius: 10px; padding: .9rem 1rem; }
    .ql-card-title { font-weight: 600; color: #1f2329; font-size: .95rem; margin-bottom: .35rem; }
    .ql-card-body { font-size: .85rem; color: #6b7280; line-height: 1.65; }

    /* 徽章 / pill（表格内 EXP、状态标签等） */
    .badge { display: inline-block; padding: .05rem .5rem; border-radius: 999px; font-size: .72rem; font-weight: 600; line-height: 1.5; }
    .badge-green { background: #e8f9ee; color: #009a29; }
    .badge-blue  { background: #eaf2ff; color: #1677ff; }
    .badge-gray  { background: #f2f3f5; color: #6b7280; }
    .badge-amber { background: #fff3e0; color: #d97500; }

    /* 右侧大纲（滚动高亮指示器 + 层级缩进） */
    .outline-link { display: block; padding: 4px 0 4px 14px; font-size: 13px; line-height: 1.5; color: #86909c; border-left: 2px solid #f0f0f0; transition: color .15s, border-color .15s; text-decoration: none; }
    .outline-link:hover { color: #1f2329; }
    .outline-link.active { color: #1677ff; border-left-color: #1677ff; font-weight: 500; }
    .outline-link.lvl-3 { padding-left: 26px; font-size: 12px; }
  </style>
</head>
<body class="bg-white text-gray-800 min-h-screen">

  <!-- 顶部导航 -->
  <nav class="sticky top-0 z-50 bg-white/85 backdrop-blur border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ROOT}}index.html" class="text-sm text-gray-400 hover:text-blue-600 transition-colors">&larr; 返回首页</a>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400 mr-1">{{DATE}}</span>
        <button onclick="mdsite.copyLink()" title="复制链接" aria-label="复制链接"
                class="p-1.5 rounded-md text-gray-400 hover:text-blue-600 hover:bg-gray-100 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 010 5.656l-3 3a4 4 0 01-5.656-5.656l1.5-1.5M10.172 13.828a4 4 0 010-5.656l3-3a4 4 0 015.656 5.656l-1.5 1.5"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 lg:flex lg:gap-10">
    <!-- 主内容 -->
    <main class="flex-1 min-w-0 py-10">
      <header class="mb-8 pb-6 border-b border-gray-100">
        <p class="text-xs uppercase tracking-widest text-blue-600 font-semibold mb-2">{{CATEGORY}}</p>
        <h1 class="text-3xl font-bold text-gray-900 leading-tight">{{TITLE}}</h1>
        <p class="mt-3 text-sm text-gray-400">{{DATE}}</p>
        <div class="mt-5 bg-blue-50/70 border-l-4 border-blue-500 px-4 py-3 rounded-r-lg">
          <p class="text-[15px] text-gray-600 leading-relaxed">{{SUMMARY}}</p>
        </div>
      </header>

      <!-- 移动端折叠目录（窄屏；桌面用右侧 sticky 大纲） -->
      <details id="toc-mobile" class="lg:hidden mb-6 border border-gray-100 rounded-lg hidden">
        <summary class="px-4 py-2.5 text-sm text-gray-500 cursor-pointer select-none">目录</summary>
        <nav id="outline-mobile" class="px-2 pb-3"></nav>
      </details>

      <article id="article" class="prose-mdsite">
        {{BODY}}
      </article>

      <footer class="border-t border-gray-100 pt-6 mt-12 text-sm text-gray-400">
        由 <span class="font-medium text-gray-500">{{SITE_TITLE}}</span> 生成 · {{DATE}} ·
        <a href="{{ROOT}}index.html" class="hover:text-blue-600">查看全部报告</a>
      </footer>
    </main>

    <!-- 右侧大纲（自动从正文标题生成；窄屏隐藏） -->
    <aside class="hidden lg:block w-56 flex-shrink-0">
      <div class="sticky top-20 py-10 overflow-y-auto max-h-[calc(100vh-5rem)]">
        <p id="outline-title" class="text-xs font-medium text-gray-400 mb-3 pl-3.5 hidden">目录</p>
        <nav id="outline"></nav>
      </div>
    </aside>
  </div>

  <script>
    // 从正文标题(h2/h3)自动生成大纲(桌面右侧 + 移动端折叠) + 滚动高亮，适配任意 Markdown
    (function () {
      const article = document.getElementById('article');
      const outline = document.getElementById('outline');
      const outlineM = document.getElementById('outline-mobile');
      if (!article || !outline) return;
      const heads = article.querySelectorAll('h2, h3');
      if (!heads.length) return;
      document.getElementById('outline-title').classList.remove('hidden');
      const tocM = document.getElementById('toc-mobile');
      if (tocM) tocM.classList.remove('hidden'); // 有标题才显示移动端目录
      const slug = (t, i) => (t.toLowerCase().replace(/[^\w一-龥]+/g, '-').replace(/^-+|-+$/g, '') || 'sec') + '-' + i;
      heads.forEach((h, i) => {
        if (!h.id) h.id = slug(h.textContent, i);
        const cls = 'outline-link' + (h.tagName === 'H3' ? ' lvl-3' : '');
        [outline, outlineM].forEach((box) => {
          if (!box) return;
          const a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent;
          a.className = cls;
          box.appendChild(a);
        });
      });
      const links = outline.querySelectorAll('.outline-link');
      const obs = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            links.forEach((l) => l.classList.remove('active'));
            const a = outline.querySelector('a[href="#' + e.target.id + '"]');
            if (a) a.classList.add('active');
          }
        });
      }, { rootMargin: '-10% 0px -70% 0px' });
      heads.forEach((h) => obs.observe(h));
    })();

    // 复制当前页面链接 + toast
    window.mdsite = {
      async copyLink() {
        try { await navigator.clipboard.writeText(location.href); mdsite.toast('链接已复制'); }
        catch (e) { mdsite.toast('复制失败'); }
      },
      toast(msg) {
        const el = document.createElement('div');
        el.textContent = msg;
        el.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity duration-200 z-[100] pointer-events-none';
        document.body.appendChild(el);
        requestAnimationFrame(() => { el.style.opacity = '1'; });
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 250); }, 1700);
      }
    };
  </script>
</body>
</html>
